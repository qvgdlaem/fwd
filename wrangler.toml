name = "fwd"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Comma-separated list of path namespaces your reverse proxy routes to this worker.
# e.g. PREFIXES = "/fwd,/win,/go"
# Leave empty if deploying standalone on a subdomain (e.g. go.yourdomain.com).
[vars]
PREFIXES = ""

[[d1_databases]]
binding = "FWD_DB"
database_name = "fwd"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# Rate limiting: max 5 login attempts per minute per IP
[[unsafe.bindings]]
type = "ratelimit"
name = "LOGIN_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

# Uncomment and set if you want to scope the Worker to a specific route
# (e.g. when deployed behind a reverse proxy at /fwd/*)
# [triggers]
# routes = ["yourdomain.com/fwd/*"]
